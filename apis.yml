description: >-
  New York Community Bancorp, Inc. (now operating as Flagstar Financial) is a
  Fortune 500 bank holding company headquartered in Hicksville, New York.
  Through its banking subsidiary, the company provides commercial banking,
  multi-family lending, mortgage banking, and consumer banking services across
  the United States. This repository captures any APIs, developer tools, and
  machine-readable API artifacts associated with the company. No public
  developer APIs or documentation portal have been identified at this time.
